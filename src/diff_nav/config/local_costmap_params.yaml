local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 10.0
  publish_frequency: 10.0
  rolling_window: true
  width: 10.0
  height: 10.0
  resolution: 0.05

  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    enabled: true
    observation_sources: laser
    laser:
      topic: /scan
      sensor_frame: velodyne # SỬA LẠI THEO frame_id CỦA TOPIC /SCAN
      data_type: LaserScan
      marking: true
      clearing: true
      min_obstacle_height: -0.5
      max_obstacle_height: 3.0
      inf_is_valid: true      # Rất quan trọng với Velodyne trong Gazebo

  inflation_layer:
    inflation_radius: 0.45    # Đừng để quá lớn, robot sẽ khó di chuyển
