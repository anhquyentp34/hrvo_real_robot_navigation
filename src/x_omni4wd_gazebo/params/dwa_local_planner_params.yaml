DWAPlannerROS:
  # Robot Configuration Parameters
  max_vel_x: 1.0
  min_vel_x: 0.0

  max_vel_y: 1.0
  min_vel_y: -1.0

  max_vel_trans: 1.0
  min_vel_trans: 0.1
  max_vel_theta: 2.0
  min_vel_theta: -2.0

  acc_lim_x: 2.5
  acc_lim_y: 2.5
  acc_lim_theta: 3.2
  acc_lim_trans: 1.0

  # Goal Tolerance Parameters
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.25
  latch_xy_goal_tolerance: false

  # Forward Simulation Parameters
  sim_time: 1.7
  vx_samples: 20
  vy_samples: 20
  vtheta_samples: 40
  sim_granularity: 0.025
  angular_sim_granularity: 0.1

  # Trajectory Scoring Parameters
  meter_scoring: true
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.25
  pdist_scale: 0.6
  gdist_scale: 0.8
  occdist_scale: 0.01
  forward_point_distance: 0.325

  # Oscillation Prevention Parameters
  oscillation_reset_dist: 0.05

  # Debugging
  print_out: false

