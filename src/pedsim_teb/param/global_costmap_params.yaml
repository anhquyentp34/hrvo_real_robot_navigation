global_costmap:
   global_frame: odom
   robot_base_frame: base_footprint
   update_frequency: 10.0
   publish_frequency: 2
   static_map: false
   transform_tolerance: 0.5

   # Không có map tĩnh: cửa sổ phải cuộn theo robot. Trước đây cố định 10x10 tại gốc → goal thường nằm ngoài map.
   rolling_window: true
   width: 30.0
   height: 30.0
   resolution: 0.1
   plugins:
    - {name: obstacle_layer,          type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer,         type: "costmap_2d::InflationLayer"}

   obstacle_layer:
     observation_sources: Pointsensor   #scan
     Pointsensor: {data_type: PointCloud, topic: /pedsim_obstacle_sensor/point_cloud_global, sensor_frame: base_footprint, marking: true, clearing: true, min_obstacle_height: 0.0, max_obstacle_height: 3}
