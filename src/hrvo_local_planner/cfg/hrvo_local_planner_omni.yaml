# HRVOLocalPlanner — cấu hình cho base holonomic (omni 4 bánh: vx, vy, omega trên base).
HRVOLocalPlanner:
  holonomic_mode: true
  max_vel_x: 0.8
  max_vel_y: 0.8
  max_vel_theta: 1.2
  acc_lim_x: 0.8
  acc_lim_y: 0.8
  acc_lim_theta: 1.5

  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.20
  lookahead_dist: 1.0
  goal_reset_every: 12
  goal_update_dist: 0.30
  min_vnorm_dir: 0.02

  neighbor_dist: 10.0
  max_neighbors: 30
  max_other_agents_for_hrvo: 80
  static_agent_speed_thresh: 0.05
  robot_radius: 0.28
  goal_radius: 0.20
  pref_speed: 0.60
  max_speed: 0.90
  uncertainty_offset: 0.20
  max_accel: 1.0
  time_step: 0.10

  heading_kp: 1.8
  heading_brake_angle: 1.05
  min_speed_turning_scale: 0.20
  slowdown_cos: false
  stop_yaw_error: 0.15
  rotate_enter_error: 0.20
  rotate_exit_error: 0.10

  use_hrvo_input_topic: true
  hrvo_input_topic: /hrvo/input
  hrvo_input_timeout: 0.5
  use_hrvo_input_robot_state: true

  agent_fusion_policy: merge
  agent_duplicate_radius: 0.35

  use_gazebo_agents: false
  gazebo_model_states_topic: /gazebo/model_states
  include_humans: true
  gazebo_frame: world
  human_prefix: actor
  human_radius: 0.38

  use_tracked_people: false
  tracked_people_topic: /people
  tracked_people_timeout: 0.6
  tracked_person_radius: 0.42
  people_velocity_alpha: 0.6
  min_people_speed_for_hrvo: 0.05

  allow_world_as_global_when_tf_fails: true
  model_states_timeout: 0.3

  # Đã hỗ trợ rollout holonomic (vx, vy trên base) trong isCmdSafe — có thể bật lại.
  use_costmap_safety: true
  obstacle_cost_threshold: 254
  safety_rollout_time: 0.4
  safety_dt: 0.08
  safety_radius_padding: 0.0
