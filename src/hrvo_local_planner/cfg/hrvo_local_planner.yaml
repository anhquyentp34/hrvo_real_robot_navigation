# FILE: hrvo_local_planner/config/hrvo_local_planner.yaml
HRVOLocalPlanner:
HRVOLocalPlanner:
  max_vel_x: 0.8
  max_vel_theta: 0.9
  acc_lim_x: 0.5
  acc_lim_theta: 1.2

  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.20
  lookahead_dist: 1.0
  goal_reset_every: 12
  goal_update_dist: 0.30
  min_vnorm_dir: 0.02

  neighbor_dist: 10.0
  max_neighbors: 20
  robot_radius: 0.28
  goal_radius: 0.20
  pref_speed: 0.45
  max_speed: 0.65
  uncertainty_offset: 0.20
  max_accel: 0.8
  time_step: 0.10

  heading_kp: 2.2
  slowdown_cos: true
  stop_yaw_error: 0.9

  use_gazebo_agents: true
  include_humans: true
  gazebo_frame: world
  human_prefix: actor
  human_radius: 0.38

  allow_world_as_global_when_tf_fails: true
  model_states_timeout: 0.3

  use_costmap_safety: true
  obstacle_cost_threshold: 253
  safety_rollout_time: 0.8
  safety_dt: 0.08
  safety_radius_padding: 0.04
