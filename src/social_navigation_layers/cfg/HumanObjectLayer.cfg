#!/usr/bin/env python
PACKAGE = "social_navigation_layers"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("enabled", bool_t, 0, "Whether to apply this plugin or not", True)
gen.add("cutoff", double_t, 0, "Smallest value to publish on costmap adjustments", 0.8, 0.0, 255.0)
gen.add("amplitude", double_t, 0, "Amplitude of adjustments at peak", 254.0, 0.0, 255.0)
gen.add("covar", double_t, 0, "Base covariance for Gaussian", 4.0, 0.0, 50.0)
gen.add("factor", double_t, 0, "Factor to adjust covariance based on distance", 1.0, 0.0, 5.0)
gen.add("human_object_density_weight", double_t, 0, "Density attenuation weight for social cost", 0.0, 0.0, 10.0)
gen.add("keep_time", double_t, 0, "How long to keep social data in seconds", 0.75, 0.0, 10.0)

exit(gen.generate(PACKAGE, "social_navigation_layers", "HumanObjectLayer")) 