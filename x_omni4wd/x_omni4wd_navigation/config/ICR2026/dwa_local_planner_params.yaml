base_local_planner: dwa_local_planner/DWAPlannerROS
DWAPlannerROS:
# Robot Configuration Parameters (x_omni4wd: omni 4 bánh, holonomic)
  max_vel_x: 0.45
  min_vel_x: -0.45

  max_vel_y: 0.40
  min_vel_y: -0.40

  max_vel_trans: 0.50
  min_vel_trans: 0.05

  max_vel_theta: 0.60
  min_vel_theta: -0.60

  acc_lim_x: 0.40
  acc_lim_y: 0.40
  acc_lim_theta: 0.85

# Goal Tolerance Parameters
  xy_goal_tolerance: 0.4
  yaw_goal_tolerance: 0.6
  latch_xy_goal_tolerance: true

# Forward Simulation Parameters
  sim_time: 3.0
  sim_granularity: 0.025
  angular_sim_granularity: 0.1
  vx_samples: 12
  vy_samples: 12
  vtheta_samples: 20
  controller_frequency: 10.0

# Trajectory Scoring Parameters
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.2
  stop_time_buffer: 0.5
  scaling_speed: 0.15
  max_scaling_factor: 0.2

# Oscillation Prevention Parameters
  oscillation_reset_dist: 0.15
  oscillation_reset_angle: 0.4

# Global Plan Parameters
  prune_plan: true
  prune_distance: 2.0

# Debugging
  publish_traj_pc : true
  publish_cost_grid_pc: true

# x_omni4wd: omni 4 bánh (holonomic)
  holonomic_robot: true

# Recovery behavior parameters
  escape_vel: -0.2
  escape_reset_dist: 0.5
  escape_reset_theta: 1.57

# Social navigation parameters
  social_compliance: true
  personal_space_threshold: 0.8
  social_momentum_scale: 0.7

